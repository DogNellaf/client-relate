{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}ClientRelate{% endblock title %}</title>
    <link rel="stylesheet" href="{% static "css/bootstrap.min.css" %}" />
    <link rel="stylesheet" href="{% static "css/style.css" %}" />
</head>
<body class="bg-dark text-light">
    {% if user.is_authenticated %}
    <nav class="navbar navbar-dark bg-secondary px-3 mb-3">
        <span class="navbar-brand">ClientRelate</span>
        <div class="d-flex align-items-center gap-2">
            <span class="text-light me-3">{{ user.username }}</span>
            <a class="btn btn-sm btn-outline-light me-2" href="{% url 'home' %}">Главная</a>
            <form method="POST" action="{% url 'logout' %}" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-sm btn-outline-danger">Выйти</button>
            </form>
        </div>
    </nav>
    {% endif %}
    <div class="container">
        {% block content %}{% endblock content %}
    </div>
    <script src="{% static "js/bootstrap.bundle.min.js" %}"></script>
</body>
</html>
